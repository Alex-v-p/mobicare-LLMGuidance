apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: llmguidance
spec:
  selector:
    app.kubernetes.io/name: inference
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: llmguidance
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference
    spec:
      containers:
        - name: inference
          image: mobicare-llm/inference-http:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: llmguidance-config
            - secretRef:
                name: llmguidance-secrets
          startupProbe:
            httpGet:
              path: /ready
              port: 8001
            failureThreshold: 60
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
