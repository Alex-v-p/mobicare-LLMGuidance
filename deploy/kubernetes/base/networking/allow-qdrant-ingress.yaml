apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-qdrant-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: inference
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: inference-worker
      ports:
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 6334
