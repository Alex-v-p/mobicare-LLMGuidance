apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: inference
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: inference-worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: inference-bootstrap-minio
      ports:
        - protocol: TCP
          port: 9000
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9001
