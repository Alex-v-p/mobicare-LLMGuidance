apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-worker
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: llmguidance
    spec:
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inference-worker
          image: mobicare-llm/inference-worker
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: llmguidance-config
            - secretRef:
                name: llmguidance-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - grep -aq 'inference.worker.runtime.main' /proc/1/cmdline
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - grep -aq 'inference.worker.runtime.main' /proc/1/cmdline
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
