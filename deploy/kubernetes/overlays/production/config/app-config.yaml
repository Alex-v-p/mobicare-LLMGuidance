apiVersion: v1
kind: ConfigMap
metadata:
  name: llmguidance-config
data:
  APP_ENV: "prod"
  API_PORT: "8000"
  INFERENCE_PORT: "8001"
  INFERENCE_URL: "http://inference:8001"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "guidance_chunks"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_DOCUMENTS_BUCKET: "guidance-documents"
  MINIO_DOCUMENTS_PREFIX: ""
  MINIO_RESULTS_BUCKET: "guidance-job-results"
  MINIO_JOB_RETENTION_DAYS: "7"
  CLINICAL_CONFIG_SOURCE: "minio"
  CLINICAL_CONFIG_BUCKET: "guidance-config"
  CLINICAL_CONFIG_PREFIX: "clinical"
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_MODEL: "qwen2.5:0.5b"
  OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
  OLLAMA_TIMEOUT_S: "600"
  OLLAMA_EMBEDDING_BATCH_SIZE: "8"
  OLLAMA_EMBEDDING_FALLBACK_CONCURRENCY: "2"
  RETRIEVAL_TOP_K: "3"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_JOB_QUEUE: "guidance_jobs"
  REDIS_INGESTION_JOB_QUEUE: "ingestion_jobs"
  JOB_TTL_SECONDS: "604800"
  JOB_LEASE_SECONDS: "600"
  CALLBACK_TIMEOUT_S: "10"
  CALLBACK_MAX_ATTEMPTS: "3"
  HEALTHCHECK_TIMEOUT_S: "5"
  DOCUMENT_UPLOAD_MAX_BYTES: "52428800"
  DOCUMENT_ALLOWED_EXTENSIONS_CSV: ""
  DOCUMENT_ALLOWED_CONTENT_TYPES_CSV: ""
  AUTH_VALIDATION_URL: "https://auth.example.com/validate"
  AUTH_VALIDATION_TIMEOUT_S: "10"
  JWT_ACCESS_TOKEN_EXP_MINUTES: "60"
  JWT_ISSUER: "mobicare-llm-api"
  JWT_AUDIENCE: "mobicare-gateway"
  WORKER_ID: ""
  JOB_HEARTBEAT_INTERVAL_SECONDS: "20"
