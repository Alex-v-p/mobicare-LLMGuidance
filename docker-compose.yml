services:
  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    env_file:
      - .env
    environment:
      API_PORT: "${API_PORT:-8000}"
      INFERENCE_URL: "${INFERENCE_URL:-http://inference:${INFERENCE_PORT:-8001}}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:${QDRANT_PORT:-6333}}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-guidance_chunks}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://minio:${MINIO_PORT:-9000}}"
      MINIO_DOCUMENTS_BUCKET: "${MINIO_DOCUMENTS_BUCKET:-guidance-documents}"
      MINIO_DOCUMENTS_PREFIX: "${MINIO_DOCUMENTS_PREFIX:-}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:${OLLAMA_PORT:-11434}}"
      OLLAMA_EMBEDDING_MODEL: "${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      inference:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  inference:
    build:
      context: .
      dockerfile: deploy/inference.http.Dockerfile
    env_file:
      - .env
    environment:
      INFERENCE_PORT: "${INFERENCE_PORT:-8001}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:${OLLAMA_PORT:-11434}}"
      OLLAMA_EMBEDDING_MODEL: "${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:${QDRANT_PORT:-6333}}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-guidance_chunks}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://minio:${MINIO_PORT:-9000}}"
      MINIO_DOCUMENTS_BUCKET: "${MINIO_DOCUMENTS_BUCKET:-guidance-documents}"
      MINIO_DOCUMENTS_PREFIX: "${MINIO_DOCUMENTS_PREFIX:-}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      REDIS_JOB_QUEUE: "${REDIS_JOB_QUEUE:-guidance_jobs}"
      JOB_TTL_SECONDS: "${JOB_TTL_SECONDS:-604800}"
      MINIO_RESULTS_BUCKET: "${MINIO_RESULTS_BUCKET:-guidance-job-results}"
      MINIO_JOB_RETENTION_DAYS: "${MINIO_JOB_RETENTION_DAYS:-7}"
    ports:
      - "${INFERENCE_PORT:-8001}:8001"
    depends_on:
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  inference-worker:
    build:
      context: .
      dockerfile: deploy/inference.worker.Dockerfile
    env_file:
      - .env
    environment:
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:${OLLAMA_PORT:-11434}}"
      OLLAMA_EMBEDDING_MODEL: "${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://minio:${MINIO_PORT:-9000}}"
      MINIO_DOCUMENTS_BUCKET: "${MINIO_DOCUMENTS_BUCKET:-guidance-documents}"
      MINIO_DOCUMENTS_PREFIX: "${MINIO_DOCUMENTS_PREFIX:-}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      REDIS_JOB_QUEUE: "${REDIS_JOB_QUEUE:-guidance_jobs}"
      JOB_TTL_SECONDS: "${JOB_TTL_SECONDS:-604800}"
      MINIO_RESULTS_BUCKET: "${MINIO_RESULTS_BUCKET:-guidance-job-results}"
      MINIO_JOB_RETENTION_DAYS: "${MINIO_JOB_RETENTION_DAYS:-7}"
      CALLBACK_TIMEOUT_S: "${CALLBACK_TIMEOUT_S:-10}"
      CALLBACK_MAX_ATTEMPTS: "${CALLBACK_MAX_ATTEMPTS:-3}"
    depends_on:
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_bytes().replace(b'\\x00', b' ').decode(); sys.exit(0 if 'inference.worker.runtime.main' in cmd else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

    # Uncomment this block to allow Ollama to use NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # environment:
    #   NVIDIA_VISIBLE_DEVICES: all
    #   NVIDIA_DRIVER_CAPABILITIES: compute,utility

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  qdrant:
  minio:
  ollama:
