services:
  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    env_file:
      - .env
    environment:
      API_PORT: "${API_PORT:-8000}"

      # Internal service URLs (docker network)
      INFERENCE_URL: "${INFERENCE_URL:-http://inference:${INFERENCE_PORT:-8001}}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:${QDRANT_PORT:-6333}}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://minio:${MINIO_PORT:-9000}}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:${OLLAMA_PORT:-11434}}"
    ports:
      - "${API_PORT:-8000}:8000"

  inference:
    build:
      context: .
      dockerfile: deploy/inference.http.Dockerfile
    env_file:
      - .env
    environment:
      INFERENCE_PORT: "${INFERENCE_PORT:-8001}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:${OLLAMA_PORT:-11434}}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:${QDRANT_PORT:-6333}}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://minio:${MINIO_PORT:-9000}}"
    ports:
      - "${INFERENCE_PORT:-8001}:8001"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"


  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  qdrant:
  minio:
  ollama: