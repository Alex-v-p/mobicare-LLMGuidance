name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            pyproject.toml
            .pylintrc
            pants.toml
            .env.example
            deploy/*.Dockerfile
            docker-compose.yml
            infra/compose/docker-compose.yml

      - name: Set up Pants
        uses: pantsbuild/actions/init-pants@v9
        with:
          gha-cache-key: v0

      - name: Install locked dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install -e . --no-deps

      - name: Verify Pants bootstrap
        run: |
          pants --version

      - name: Run Pants lint
        run: |
          pants lint ::

      - name: Run Pylint (pass at 9.75+)
        env:
          PYTHONPATH: services/api/src:services/inference/src:services/shared/src
        run: |
          set -o pipefail

          files=$(git ls-files 'services/**/*.py')

          if [ -z "$files" ]; then
            echo "No Python files found in services/."
            exit 0
          fi

          pylint $files | tee pylint-report.txt || true

          score=$(python -c "import re, pathlib; text = pathlib.Path('pylint-report.txt').read_text(encoding='utf-8'); match = re.search(r'rated at\\s+([0-9]+\\.[0-9]+)/10', text); print(match.group(1) if match else '')")

          if [ -z "$score" ]; then
            echo "Could not determine Pylint score."
            exit 1
          fi

          python -c "score = float('$score'); threshold = 9.75; print(f'Pylint score: {score:.2f}/10 (threshold: {threshold:.2f})'); import sys; sys.exit(0 if score >= threshold else 1)"

      - name: Run test suite
        env:
          PYTHONPATH: services/api/src:services/inference/src:services/shared/src
        run: |
          pytest -vv -l --tb=short

      - name: Create CI .env from example
        run: |
          cp .env.example .env

      - name: Validate Docker Compose file
        run: |
          docker compose config

      - name: Build Docker images
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          docker compose build api inference inference-worker
