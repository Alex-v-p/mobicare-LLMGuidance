name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            .pylintrc
            pants.toml

      - name: Set up Pants
        uses: pantsbuild/actions/init-pants@v9
        with:
          gha-cache-key: v0

      - name: Install Pylint and runtime deps for import resolution
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "pylint==4.0.5" \
            "fastapi==0.115.0" \
            "uvicorn[standard]==0.30.6" \
            "httpx==0.27.2" \
            "pydantic==2.9.2" \
            "pydantic-settings==2.5.2" \
            "redis>=5,<6" \
            "minio>=7,<8" \
            "qdrant-client>=1.9,<2" \
            "pypdf>=5,<6"

      - name: Verify Pants bootstrap
        run: |
          pants --version

      - name: Run Pants lint
        run: |
          pants lint ::

      - name: Run Pylint
        env:
          PYTHONPATH: services/api/src:services/inference/src:services/shared/src
        run: |
          files=$(git ls-files '*.py')
          if [ -z "$files" ]; then
            echo "No Python files found."
            exit 0
          fi
          pylint $files

      - name: Validate Docker Compose file
        run: |
          docker compose config

      - name: Build Docker images
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          docker compose build api inference inference-worker