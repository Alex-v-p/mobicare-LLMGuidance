name: Build and package

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            pyproject.toml

      - name: Install locked dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install -e . --no-deps

      - name: Run test suite
        env:
          PYTHONPATH: services/api/src:services/inference/src:services/shared/src
        run: |
          pytest -vv -l --tb=short

      - name: Create CI .env from example
        run: |
          cp .env.example .env

      - name: Validate Docker Compose configuration
        run: |
          docker compose config -q

      - name: Build deployable images
        run: |
          docker compose build api inference inference-worker

      - name: Show built images
        run: |
          docker images

      - name: Compute lowercase registry path
        run: |
          echo "IMAGE_PREFIX=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/mobicare-llmguidance" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag images for GHCR
        run: |
          docker tag mobicare-llmguidance-api $IMAGE_PREFIX-api:${GITHUB_SHA}
          docker tag mobicare-llmguidance-api $IMAGE_PREFIX-api:latest

          docker tag mobicare-llmguidance-inference $IMAGE_PREFIX-inference:${GITHUB_SHA}
          docker tag mobicare-llmguidance-inference $IMAGE_PREFIX-inference:latest

          docker tag mobicare-llmguidance-inference-worker $IMAGE_PREFIX-inference-worker:${GITHUB_SHA}
          docker tag mobicare-llmguidance-inference-worker $IMAGE_PREFIX-inference-worker:latest

      - name: Push images to GHCR
        run: |
          docker push $IMAGE_PREFIX-api:${GITHUB_SHA}
          docker push $IMAGE_PREFIX-api:latest

          docker push $IMAGE_PREFIX-inference:${GITHUB_SHA}
          docker push $IMAGE_PREFIX-inference:latest

          docker push $IMAGE_PREFIX-inference-worker:${GITHUB_SHA}
          docker push $IMAGE_PREFIX-inference-worker:latest

      - name: Export Docker images
        run: |
          mkdir -p dist/images
          docker image save \
            mobicare-llmguidance-api \
            mobicare-llmguidance-inference \
            mobicare-llmguidance-inference-worker \
            -o dist/images/llmguidance-images-${GITHUB_SHA}.tar
          gzip -f dist/images/llmguidance-images-${GITHUB_SHA}.tar

      - name: Create source deployment bundle
        run: |
          mkdir -p dist/bundles
          tar \
            --exclude='.git' \
            --exclude='.pants.d' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            -czf dist/bundles/llmguidance-deployment-${GITHUB_SHA}.tar.gz \
            .

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llmguidance-package-${{ github.sha }}
          path: |
            dist/images/llmguidance-images-${{ github.sha }}.tar.gz
            dist/bundles/llmguidance-deployment-${{ github.sha }}.tar.gz
          if-no-files-found: error
